<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Project</title>
    <style>
      body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:linear-gradient(180deg,#f3f7ff 0%,#eef3fb 100%); color:#172033; }
      .shell { max-width:860px; margin:0 auto; padding:28px 18px 42px; }
      .card { background:#fff; border-radius:24px; box-shadow:0 18px 50px rgba(27,39,94,.10); border:1px solid rgba(23,32,51,.08); padding:24px; }
      h1 { margin:0 0 6px; font-size:30px; }
      p { margin:0 0 18px; color:#5c6680; }
      .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
      .fieldFull { grid-column:1 / -1; }
      label { display:block; margin:4px 0 6px; font-weight:700; }
      input, select, textarea { width:100%; box-sizing:border-box; padding:12px 14px; border-radius:14px; border:1px solid rgba(23,32,51,.14); font-size:15px; font-family:inherit; background:#fff; color:#172033; }
      textarea { min-height:140px; resize:vertical; }
      .editorTools { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
      .toolLabel { font-size:13px; font-weight:700; color:#4d5d79; }
      .toolButton { min-height:40px; padding:0 16px; border-radius:12px; border:1px solid rgba(23,32,51,.12); background:#fff; color:#172033; cursor:pointer; font-weight:700; }
      .toolButtonHighlight { background:#fff2a8; border-color:#e6c84f; color:#172033; }
      .toolButtonActive { box-shadow:0 0 0 4px rgba(39,94,254,.10); border-color:rgba(39,94,254,.45); }
      .editorNote { margin:0 0 10px; color:#5c6680; font-size:13px; }
      .richEditor { width:100%; min-height:180px; padding:12px 14px; border-radius:14px; border:1px solid rgba(23,32,51,.14); font-size:15px; font-family:inherit; background:#fff; color:#172033; line-height:1.6; outline:none; box-sizing:border-box; }
      .richEditor:focus { border-color:rgba(39,94,254,.45); box-shadow:0 0 0 4px rgba(39,94,254,.08); }
      .richEditor p, .richEditor div { margin:0 0 8px; }
      .actions { display:flex; gap:12px; flex-wrap:wrap; margin-top:18px; }
      .actions button, .actions a { display:inline-flex; align-items:center; justify-content:center; min-height:48px; padding:0 18px; border-radius:14px; font-weight:700; text-decoration:none; }
      .actions button { border:0; background:#275efe; color:#fff; cursor:pointer; }
      .actions button:disabled { opacity:.65; cursor:not-allowed; }
      .actions a { background:#eef3ff; color:#1e3a8a; }
      .flash { margin:0 0 16px; padding:12px 14px; border-radius:12px; background:#fff4e5; color:#9a4d00; border:1px solid rgba(245,159,0,.25); }
      .flash.success { background:#ecfdf3; color:#166534; border-color:rgba(34,197,94,.25); }
      .flash.error { background:#fff4e5; color:#9a4d00; border-color:rgba(245,159,0,.25); }
      .historyBox {
        margin-top: 10px;
        padding: 18px;
        border-radius: 14px;
        border: 1px solid rgba(23,32,51,.14);
        background: #f8faff;
        max-height: 450px;
        overflow-y: auto;
      }

      .historyEntry {
        padding-bottom: 16px;
        margin-bottom: 16px;
        border-bottom: 1px solid rgba(23,32,51,.12);
      }

      .historyEntry:last-child {
        border-bottom: none;
        margin-bottom: 0;
      }

      .historyDate {
        font-weight: 700;
        color: #172033;
        margin-bottom: 8px;
      }

      .historyText {
        color: #5c6680;
        line-height: 1.6;
      }
      @media (max-width:680px) { .grid { grid-template-columns:1fr; } }
    </style>
  </head>

  <body>
    <div class="shell">
      <div class="card">
        <h1>Edit Project</h1>
        <p>Update the project details below. Saving will refresh the dashboard.</p>

        <div id="pageMessage" class="flash" style="display:none;"></div>

        <form id="projectForm">
          <div class="grid">
            <div>
              <label for="project_number">Project Number</label>
              <input id="project_number" name="project_number" type="text" required />
            </div>

            <div>
              <label for="engineer">Project Engineer</label>
              <select id="engineer" name="engineer" required>
                <option value="">Select Project Engineer</option>
                <option value="Behrad">Behrad</option>
                <option value="Kash">Kash</option>
                <option value="Shawn">Shawn</option>
                <option value="Xiaohan">Xiaohan</option>
              </select>
            </div>

            <div class="fieldFull">
              <label for="project_name">Project Name</label>
              <input id="project_name" name="project_name" type="text" required />
            </div>

            <div>
              <label for="project_status">Project Status</label>
              <select id="project_status" name="project_status" required>
                <option value="No Contract">No Contract</option>
                <option value="Contract">Contract</option>
              </select>
            </div>

            <div>
              <label for="sales_person">Sales Person</label>
              <select id="sales_person" name="sales_person" required>
                <option value="">Select Sales Person</option>
                <option value="Victor Sanchez">Victor Sanchez</option>
                <option value="Michael Howlett">Michael Howlett</option>
                <option value="David Newell">David Newell</option>
                <option value="Brad Quay">Brad Quay</option>
                <option value="Max Diaz">Max Diaz</option>
                <option value="Francis Tenggardjaja">Francis Tenggardjaja</option>
              </select>
            </div>

            <div>
              <label for="start_date">Start Date</label>
              <input id="start_date" name="start_date" type="date" required />
            </div>

            <div class="fieldFull">
              <label for="descriptionEditor">Description</label>

              <div class="editorTools">
                <span class="toolLabel">Text tools</span>
                <button class="toolButton" id="applyBoldText" type="button">Bold</button>
                <button class="toolButton toolButtonHighlight" id="applyHighlightText" type="button">Highlight</button>
              </div>

              <div class="editorNote">Click a tool to turn it on for what you type next, or select words first to format them. Saving timestamps the newest update.</div>

              <label>Latest Update</label>
              <div id="descriptionEditor" class="richEditor" contenteditable="true"></div>
              <div class="fieldFull">
                <label>Previous Updates</label>

                <div id="historyContainer" class="historyBox">
                </div>
              </div>
              <input id="description" name="description" type="hidden" />
              <input id="description_color" name="description_color" type="hidden" value="#000000" />
            </div>
          </div>

          <div class="actions">
            <button id="saveProjectBtn" type="submit">Update Project</button>
            <a href="index.html">Back to dashboard</a>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="projects.js"></script>
    <script src="supabaseClient.js"></script>
    

    <script>
       async function requireLogin() {
          const { data, error } = await supabaseClient.auth.getSession();

          if (error || !data.session) {
            window.location.href = "login.html";
            return false;
          }

          console.log("Logged in as:", data.session.user.email);
          return true;
        }
    </script>

    <script>
      const editor = document.getElementById("descriptionEditor");
      const hiddenDescription = document.getElementById("description");
      const applyBoldButton = document.getElementById("applyBoldText");
      const applyHighlightButton = document.getElementById("applyHighlightText");
      const descriptionColorInput = document.getElementById("description_color");
      const form = document.getElementById("projectForm");
      const saveProjectBtn = document.getElementById("saveProjectBtn");
      const pageMessage = document.getElementById("pageMessage");
      const params = new URLSearchParams(window.location.search);
      const originalProjectNumber = params.get("project");

      let savedRange = null;
      let existingDescriptionHtml = "";
      let existingProject = null;
      let highlightActive = false;

      function showMessage(text, type = "error") {
        pageMessage.textContent = text;
        pageMessage.className = `flash ${type}`;
        pageMessage.style.display = "block";
      }

      function syncEditorToInput() {
        if (!editor || !hiddenDescription) return;
        hiddenDescription.value = editor.innerHTML.trim();
      }

      function getSelectionRangeInsideEditor() {
        const selection = window.getSelection();
        if (!selection || !selection.rangeCount) return null;

        const range = selection.getRangeAt(0);
        if (!editor.contains(range.commonAncestorContainer)) return null;

        return range;
      }

      function rememberSelection() {
        const range = getSelectionRangeInsideEditor();
        if (range) savedRange = range.cloneRange();
      }

      function restoreSelection() {
        if (!savedRange) return null;

        const selection = window.getSelection();
        if (!selection) return null;

        selection.removeAllRanges();
        selection.addRange(savedRange);

        return savedRange;
      }

      function normalizeEditorMarkup() {
        if (!editor) return;

        editor.querySelectorAll("font").forEach(node => {
          const span = document.createElement("span");
          const color = (node.getAttribute("color") || "").toLowerCase();

          if (color === "#c62828" || color === "red") {
            span.style.color = "#c62828";
          } else if (color) {
            span.style.color = "#000000";
          }

          span.innerHTML = node.innerHTML;
          node.replaceWith(span);
        });

        editor.querySelectorAll("span").forEach(span => {
          const rawStyle = (span.getAttribute("style") || "").toLowerCase();
          let normalizedColor = "";

          if (
            rawStyle.includes("background-color") ||
            rawStyle.includes("background:") ||
            rawStyle.includes("yellow") ||
            rawStyle.includes("#fff2a8") ||
            rawStyle.includes("rgb(255, 242, 168)")
          ) {
            const mark = document.createElement("mark");
            mark.innerHTML = span.innerHTML;
            span.replaceWith(mark);
            return;
          }

          if (
            rawStyle.includes("#c62828") ||
            rawStyle.includes("red") ||
            rawStyle.includes("rgb(198, 40, 40)") ||
            rawStyle.includes("rgb(198,40,40)") ||
            rawStyle.includes("rgb(255, 0, 0)") ||
            rawStyle.includes("rgb(255,0,0)")
          ) {
            normalizedColor = "#c62828";
          } else if (
            rawStyle.includes("#000000") ||
            rawStyle.includes("black") ||
            rawStyle.includes("rgb(0, 0, 0)") ||
            rawStyle.includes("rgb(0,0,0)")
          ) {
            normalizedColor = "#000000";
          }

          if (normalizedColor) {
            span.setAttribute("style", `color: ${normalizedColor};`);
          } else {
            const parent = span.parentNode;
            while (span.firstChild) parent.insertBefore(span.firstChild, span);
            parent.removeChild(span);
          }
        });
      }

      function updateToolButtonStates() {
        if (applyBoldButton) {
          applyBoldButton.classList.toggle("toolButtonActive", document.queryCommandState("bold"));
        }
        if (applyHighlightButton) {
          applyHighlightButton.classList.toggle("toolButtonActive", highlightActive);
        }
      }

      function selectionHasText(range) {
        return !!range && !range.collapsed && !!range.toString().trim();
      }

      function applyEditorCommand(command) {
        if (!editor) return;

        editor.focus();

        const range = restoreSelection() || getSelectionRangeInsideEditor();
        if (range) {
          const selection = window.getSelection();
          if (selection) {
            selection.removeAllRanges();
            selection.addRange(range);
          }
        }

        if (command === "bold") {
          document.execCommand("bold", false, null);
        } else if (command === "highlight") {
          highlightActive = selectionHasText(range) ? true : !highlightActive;
          document.execCommand("hiliteColor", false, highlightActive ? "#fff2a8" : "transparent");
          document.execCommand("backColor", false, highlightActive ? "#fff2a8" : "transparent");
        }

        normalizeEditorMarkup();
        syncEditorToInput();
        rememberSelection();
        updateToolButtonStates();
      }

      function wrapSelectionWithTag(tagName) {
        if (!editor) return;

        editor.focus();

        const range = restoreSelection() || getSelectionRangeInsideEditor();
        if (!range || range.collapsed) return;

        const extracted = range.extractContents();
        if (!extracted.textContent || !extracted.textContent.trim()) return;

        const wrapper = document.createElement(tagName);
        wrapper.appendChild(extracted);
        range.insertNode(wrapper);

        const newRange = document.createRange();
        newRange.selectNodeContents(wrapper);
        savedRange = newRange.cloneRange();

        const selection = window.getSelection();
        if (selection) {
          selection.removeAllRanges();
          selection.addRange(newRange);
        }

        normalizeEditorMarkup();
        syncEditorToInput();
      }

      function wrapSelectionWithHighlight() {
        if (!editor) return;

        editor.focus();

        const range = restoreSelection() || getSelectionRangeInsideEditor();
        if (!range || range.collapsed) return;

        const extracted = range.extractContents();
        if (!extracted.textContent || !extracted.textContent.trim()) return;

        const wrapper = document.createElement("mark");
        wrapper.appendChild(extracted);
        range.insertNode(wrapper);

        const newRange = document.createRange();
        newRange.selectNodeContents(wrapper);
        savedRange = newRange.cloneRange();

        const selection = window.getSelection();
        if (selection) {
          selection.removeAllRanges();
          selection.addRange(newRange);
        }

        normalizeEditorMarkup();
        syncEditorToInput();
      }

      function getTimestampLabel() {
        return new Date().toLocaleString("en-US", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "numeric",
          minute: "2-digit"
        });
      }

      function buildTimestampedDescription(newHtml, oldHtml = "") {
        const cleanNew = String(newHtml || "").trim();
        const cleanOld = String(oldHtml || "").trim();

        const entry = `
          <div class="descriptionEntry">
            <div><strong>${getTimestampLabel()}</strong></div>
            <div>${cleanNew}</div>
          </div>
        `;

        return cleanOld ? `${entry}<hr>${cleanOld}` : entry;
      }

      function rememberSelectionFromEvent() {
        rememberSelection();
      }

      [applyBoldButton, applyHighlightButton].forEach(control => {
        if (!control) return;

        control.addEventListener("mousedown", event => {
          event.preventDefault();
          rememberSelection();
        });
      });

      if (applyBoldButton) {
        applyBoldButton.addEventListener("click", () => applyEditorCommand("bold"));
      }

      if (applyHighlightButton) {
        applyHighlightButton.addEventListener("click", () => applyEditorCommand("highlight"));
      }

      if (editor) {
        editor.addEventListener("mouseup", rememberSelectionFromEvent);
        editor.addEventListener("keyup", rememberSelectionFromEvent);
        editor.addEventListener("focus", rememberSelectionFromEvent);
        editor.addEventListener("keyup", updateToolButtonStates);
        editor.addEventListener("mouseup", updateToolButtonStates);

        editor.addEventListener("input", () => {
          normalizeEditorMarkup();
          syncEditorToInput();
          rememberSelection();
          updateToolButtonStates();
        });

        if (!editor.innerHTML.trim()) editor.innerHTML = "";

        normalizeEditorMarkup();
        syncEditorToInput();
        updateToolButtonStates();
      }

      document.addEventListener("selectionchange", () => {
        if (document.activeElement === editor || (editor && editor.contains(document.activeElement))) {
          rememberSelection();
        }
      });
      
      async function loadProjectForEdit() {
        if (!originalProjectNumber) {
          showMessage("Missing project number.", "error");
          return;
        }

        const project = await getProjectByNumber(originalProjectNumber);

        if (!project) {
          showMessage("Project not found.", "error");
          return;
        }
        existingProject = project;

        document.getElementById("project_number").value = project.project_number || "";
        document.getElementById("project_name").value = project.project_name || "";
        document.getElementById("engineer").value = project.engineer || "";
        document.getElementById("project_status").value = project.project_status || "No Contract";
        document.getElementById("sales_person").value = project.sales_person || "";
        document.getElementById("start_date").value = project.start_date || "";

        existingDescriptionHtml = project.description || project.description_html || "";

        const historyContainer = document.getElementById("historyContainer");
        if (historyContainer) {
          historyContainer.innerHTML = existingDescriptionHtml || "<div class='historyText'>No previous updates yet.</div>";
        }

        editor.innerHTML = "";
        hiddenDescription.value = "";
      }

      form.addEventListener("submit", async event => {
        event.preventDefault();

        normalizeEditorMarkup();
        syncEditorToInput();
        
        const finalDescriptionHtml = buildTimestampedDescription(
          hiddenDescription.value,
          typeof existingDescriptionHtml !== "undefined" ? existingDescriptionHtml : ""
        );

        const formValues = {
          project_number: document.getElementById("project_number").value,
          project_name: document.getElementById("project_name").value,
          engineer: document.getElementById("engineer").value,
          project_status: document.getElementById("project_status").value,
          sales_person: document.getElementById("sales_person").value,
          start_date: document.getElementById("start_date").value,
          projected_end_date: existingProject?.project_status === "Completed" ? (existingProject.projected_end_date || "") : "",
          description: finalDescriptionHtml,
          description_color: descriptionColorInput.value
        };

        const result = prepareProjectPayload(formValues);

        if (result.error) {
          showMessage(result.error, "error");
          return;
        }

        saveProjectBtn.disabled = true;
        saveProjectBtn.textContent = "Saving...";

        try {
          const { data: sessionData } = await supabaseClient.auth.getSession();

          if (!sessionData.session) {
            showMessage("You are not logged in. Please sign in again.", "error");
            window.location.href = "login.html";
            return;
          }

          console.log("Saving as:", sessionData.session.user.email);

          await updateProject(originalProjectNumber, result.project);
          showMessage("Project updated successfully.", "success");

          setTimeout(() => {
            window.location.href = "index.html";
          }, 700);
        } catch (error) {
          console.error(error);
          showMessage(error.message || "Could not save project.", "error");

          saveProjectBtn.disabled = false;
          saveProjectBtn.textContent = "Save Project";
        }
      });
      requireLogin().then(isLoggedIn => {
        if (isLoggedIn) loadProjectForEdit();
      });
    </script>
  </body>
</html>
