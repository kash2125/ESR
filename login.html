<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Engineering Login</title>

<style>

:root {
  --bg: linear-gradient(180deg,#f3f7ff 0%,#eef3fb 100%);
  --card: #ffffff;
  --text: #172033;
  --muted: #5c6680;
  --border: rgba(23,32,51,.08);
  --input-border: rgba(23,32,51,.14);

  --primary: #275efe;
  --primary-hover: #1f4fe0;

  --secondary-bg: #eef3ff;
  --secondary-text: #1e3a8a;

  --flash-bg: #fff4e5;
  --flash-text: #9a4d00;
  --flash-border: rgba(245,159,0,.25);

  --shadow: 0 18px 50px rgba(27,39,94,.10);
}

:root[data-theme="dark"] {
  --bg: linear-gradient(180deg,#0f1726 0%,#101828 100%);
  --card: #151f32;
  --text: #edf4ff;
  --muted: #aab7cf;
  --border: rgba(255,255,255,.08);
  --input-border: rgba(255,255,255,.12);

  --primary: #4f7cff;
  --primary-hover: #6a8eff;

  --secondary-bg: #1c2940;
  --secondary-text: #c7d7ff;

  --flash-bg: rgba(245,158,11,.14);
  --flash-text: #fbbf24;
  --flash-border: rgba(245,158,11,.25);

  --shadow: 0 18px 50px rgba(0,0,0,.35);
}

body {
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}

.card {
  width:100%;
  max-width:430px;
  background:var(--card);
  border-radius:24px;
  padding:24px;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
}

h1 {
  margin:0 0 6px;
  font-size:30px;
}

p {
  margin:0 0 18px;
  color:var(--muted);
}

label {
  display:block;
  margin:8px 0 6px;
  font-weight:700;
}

input {
  width:100%;
  box-sizing:border-box;
  padding:12px 14px;
  border-radius:14px;
  border:1px solid var(--input-border);
  background:var(--card);
  color:var(--text);
  font-size:15px;
}

.actions {
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:18px;
}

.actions button,
.actions a {
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  min-height:48px;
  border-radius:14px;
  text-decoration:none;
  font-weight:700;
  box-sizing:border-box;
}

.actions button {
  border:0;
  background:var(--primary);
  color:#fff;
  cursor:pointer;
}

.actions button:hover {
  background:var(--primary-hover);
}

.actions a {
  background:var(--secondary-bg);
  color:var(--secondary-text);
}

.flash {
  margin-top:14px;
  padding:12px;
  border-radius:12px;
  background:var(--flash-bg);
  color:var(--flash-text);
  border:1px solid var(--flash-border);
  display:none;
}
</style>

</head>

<body>

<div class="card">
  <h1>Engineering Login</h1>
  <p>Sign in to add, edit, and delete projects.</p>

  <form id="loginForm">
    <label>Email</label>
    <input id="email" type="email" required>

    <label>Password</label>
    <input id="password" type="password" required>

    <div class="actions">
      <button type="submit">Sign In</button>
      <a href="index.html">Back to Dashboard</a>
    </div>
  </form>

  <div id="message" class="flash"></div>
</div>
<script>
const THEME_STORAGE_KEY = "engineeringDashboard.theme";

const savedTheme =
  localStorage.getItem(THEME_STORAGE_KEY) ||
  (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

document.documentElement.dataset.theme = savedTheme;
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<script>
const form = document.getElementById("loginForm");
const message = document.getElementById("message");

function showMessage(text) {
  message.style.display = "block";
  message.textContent = text;
}

form.addEventListener("submit", async (event) => {
  event.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    showMessage(error.message);
    return;
  }

  window.location.href = "index.html";
});
</script>

</body>
</html>
