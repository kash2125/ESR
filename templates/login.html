<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in — ESR Generator</title>
    <style>
      :root {
        --border: #e7e7e7;
        --muted: #666;
        --bg: #fafafa;
      }
      body { font-family: Arial, sans-serif; margin: 28px; background: var(--bg); }
      .card {
        max-width: 420px;
        margin: 10vh auto 0;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 18px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      }
      h1 { margin: 0 0 6px; font-size: 22px; }
      .muted { color: var(--muted); font-size: 14px; margin: 0 0 14px; }
      label { display:block; font-size: 14px; margin: 10px 0 6px; }
      input[type="text"], input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
      }
      button {
        margin-top: 14px;
        width: 100%;
        padding: 10px;
        border: 0;
        border-radius: 8px;
        background: #111;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover { opacity: 0.92; }
      .flash {
        margin: 10px 0 0;
        padding: 10px;
        border: 1px solid #f1c40f;
        background: #fff7d6;
        border-radius: 8px;
        font-size: 14px;
      }
      .footer { margin-top: 12px; font-size: 12px; color: var(--muted); }
      code { background: #f3f3f3; padding: 1px 4px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sign in</h1>
      <p class="muted">This tool is protected. Enter your credentials to continue.</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash">
            {% for msg in messages %}
              <div>{{ msg }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form action="/login" method="post" autocomplete="off">
        <input type="hidden" name="next" value="{{ next }}" />

        <label for="username">Username</label>
        <input id="username" name="username" type="text" required autofocus />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required />

        <button type="submit">Sign in</button>
      </form>

      <div class="footer">
      </div>
    </div>
  </body>
</html>
