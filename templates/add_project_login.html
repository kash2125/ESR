<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Project Sign In</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 18px;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: linear-gradient(180deg, #f3f7ff 0%, #eef3fb 100%);
      }
      .card {
        width: 100%;
        max-width: 430px;
        background: #fff;
        border-radius: 22px;
        padding: 24px;
        box-shadow: 0 18px 50px rgba(27, 39, 94, 0.10);
        border: 1px solid rgba(23,32,51,0.08);
      }
      h1 { margin: 0 0 6px; font-size: 28px; }
      p { margin: 0 0 16px; color: #5c6680; }
      label { display: block; margin: 12px 0 6px; font-weight: 650; }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(23,32,51,0.14);
        font-size: 15px;
      }
      button, .back {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 48px;
        border-radius: 14px;
        border: 0;
        text-decoration: none;
        font-weight: 700;
      }
      button {
        margin-top: 16px;
        background: #275efe;
        color: #fff;
        cursor: pointer;
      }
      .back {
        margin-top: 10px;
        background: #eef3ff;
        color: #1e3a8a;
      }
      .flash {
        margin: 12px 0 0;
        padding: 12px 14px;
        border-radius: 12px;
        background: #fff4e5;
        color: #9a4d00;
        border: 1px solid rgba(245,159,0,0.25);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Add Project</h1>
      <p>Enter the engineering credentials to access the project entry form.</p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash">
            {% for msg in messages %}
              <div>{{ msg }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form method="post" action="{{ url_for('project_admin_login_post') }}">
        <input type="hidden" name="next" value="{{ next }}" />

        <label for="username">Username</label>
        <input id="username" name="username" type="text" autocomplete="username" required autofocus />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <button type="submit">Sign in</button>
      </form>

      <a class="back" href="{{ url_for('index') }}">Back to dashboard</a>
    </div>
  </body>
</html>
